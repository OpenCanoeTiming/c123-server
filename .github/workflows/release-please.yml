name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      sha: ${{ steps.rp.outputs.sha }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # When Release Please creates a release, build the Windows installer and
  # attach it.  This replaces the tag-triggered publish-stable job that
  # previously lived in release.yml — tags created by the default
  # GITHUB_TOKEN don't re-trigger other workflows.
  build-stable-installer:
    name: Build stable installer
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: windows-latest
    permissions:
      contents: read
      packages: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      installer-name: ${{ steps.version.outputs.installer-name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build app
        run: npm run build

      - name: Stage installer payload
        run: npm run build:installer
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Inno Setup is available
        shell: pwsh
        run: |
          $iscc = 'C:\Program Files (x86)\Inno Setup 6\iscc.exe'
          if (-not (Test-Path $iscc)) {
            Write-Host "Inno Setup not found at $iscc — installing via choco"
            choco install innosetup --no-progress -y
          }
          Add-Content -Path $env:GITHUB_PATH -Value 'C:\Program Files (x86)\Inno Setup 6'

      - name: Compile installer
        run: iscc installer/c123-server.iss
        shell: cmd

      - name: Read package version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $installerName = "c123-server-setup-$version.exe"
          "version=$version"              | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "installer-name=$installerName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $version"
          Write-Host "Installer: $installerName"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: c123-server-setup-${{ steps.version.outputs.version }}
          path: installer/Output/c123-server-setup-*.exe
          if-no-files-found: error
          retention-days: 30

  publish-stable:
    name: Publish stable release
    needs: [release-please, build-stable-installer]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download installer
        uses: actions/download-artifact@v8
        with:
          pattern: c123-server-setup-*
          merge-multiple: true
          path: dist-installer

      - name: Upload installer to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh release upload "$TAG_NAME" dist-installer/*.exe
